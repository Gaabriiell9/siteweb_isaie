_format_version: "1.1"

###############################################################################
#  Kong — Configuration déclarative (DB-less)
#  Les clés sont identiques à ANON_KEY et SERVICE_ROLE_KEY dans .env
#  Si vous changez JWT_SECRET, régénérez les clés et mettez-les à jour ici.
###############################################################################

consumers:
  - username: anon
    keyauth_credentials:
      - key: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNjQxNzY5MjAwLCJleHAiOjE3OTk1MzU2MDB9.YJtPcwptZq-NGiwOvS-D8UBfvGO5-sAsrOHjPUG8YgQ
  - username: service_role
    keyauth_credentials:
      - key: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE2NDE3NjkyMDAsImV4cCI6MTc5OTUzNTYwMH0.982En3Hbn7eNWVGoHFHvxVys0DmkftXlKfwb9HNIda0

acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

# ── Plugins globaux ───────────────────────────────────────────────────────────
plugins:
  - name: cors

# ── Auth (GoTrue) — routes publiques ─────────────────────────────────────────
services:
  - name: auth-v1-open
    url: http://auth:9999/verify
    routes:
      - name: auth-v1-open
        strip_path: true
        paths:
          - /auth/v1/verify
    plugins:
      - name: cors

  - name: auth-v1-open-callback
    url: http://auth:9999/callback
    routes:
      - name: auth-v1-open-callback
        strip_path: true
        paths:
          - /auth/v1/callback
    plugins:
      - name: cors

  - name: auth-v1-open-authorize
    url: http://auth:9999/authorize
    routes:
      - name: auth-v1-open-authorize
        strip_path: true
        paths:
          - /auth/v1/authorize
    plugins:
      - name: cors

  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
          key_names:
            - apikey
            - Authorization
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - anon
            - admin

# ── REST (PostgREST) ──────────────────────────────────────────────────────────
  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true
          key_names:
            - apikey
            - Authorization
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - anon
            - admin

# ── Realtime ──────────────────────────────────────────────────────────────────
  - name: realtime-v1
    url: http://realtime:4000/socket/
    routes:
      - name: realtime-v1-all
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
          key_names:
            - apikey
            - Authorization
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - anon
            - admin

# ── Storage ───────────────────────────────────────────────────────────────────
  - name: storage-v1
    url: http://storage:5000/
    routes:
      - name: storage-v1-all
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors

# ── Postgres Meta (pour Studio) ───────────────────────────────────────────────
  - name: meta
    url: http://meta:8080/
    routes:
      - name: meta-all
        strip_path: true
        paths:
          - /pg/
    plugins:
      - name: key-auth
        config:
          hide_credentials: false
          key_names:
            - apikey
            - Authorization
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
